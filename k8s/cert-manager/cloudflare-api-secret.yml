apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token-secret
  namespace: cert-manager
type: Opaque
stringData:
  # Cloudflare API Token olusturmak icin:
  # 1. https://dash.cloudflare.com/profile/api-tokens adresine gidin
  # 2. "Create Token" > "Edit zone DNS" template'ini secin
  # 3. Zone Resources: Include > Specific zone > koyluoglu.com
  # 4. Token'i asagiya yapistirin
  api-token: "CLOUDFLARE_API_TOKEN_BURAYA"
