apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: market-backend-ingress
  namespace: market-siparis
  labels:
    app.kubernetes.io/name: market-siparis
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.koyluoglumarket.com
      secretName: market-backend-tls
  rules:
    - host: api.koyluoglumarket.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: market-backend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: market-frontend-ingress
  namespace: market-siparis
  labels:
    app.kubernetes.io/name: market-siparis
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - koyluoglumarket.com
      secretName: market-frontend-tls
  rules:
    - host: koyluoglumarket.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: market-frontend
                port:
                  number: 3000
