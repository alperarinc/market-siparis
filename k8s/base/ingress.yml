apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: market-ingress
  namespace: market-siparis
  labels:
    app.kubernetes.io/name: market-siparis
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - koyluoglufresh.com
        - api.koyluoglufresh.com
        - cdn.koyluoglufresh.com
      secretName: market-tls-secret
  rules:
    - host: api.koyluoglufresh.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: market-backend
                port:
                  number: 8080
    - host: cdn.koyluoglufresh.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: market-minio
                port:
                  number: 9000
    - host: koyluoglufresh.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: market-frontend
                port:
                  number: 3000
