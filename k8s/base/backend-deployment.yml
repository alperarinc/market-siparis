apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-backend
  namespace: market-siparis
  labels:
    app.kubernetes.io/name: market-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: market-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: market-backend
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: backend
          image: ghcr.io/alperarinc/market-siparis/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: market-backend-config
            - secretRef:
                name: market-backend-secret
          env:
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: market-backend-config
                  key: JAVA_OPTS
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Kubernetes Probes (Actuator entegrasyonu)
          startupProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 20

          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

      # Pod Anti-Affinity: replikaları farklı node'lara dağıt
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - market-backend
                topologyKey: kubernetes.io/hostname
